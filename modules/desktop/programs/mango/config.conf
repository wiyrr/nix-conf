# monitorrule=DP-2,0.5,1,tile,0,1,0,0,2560,1440,144
# Laptop display: 1080p, 60Hz, positioned at origin
monitorrule=name:DP-2,width:2560,height:1440,refresh:144

# Virtual monitor with pattern matching
# monitorrule=name:HEADLESS-.*,width:1920,height:1080,refresh:60,x:1926,y:0,scale:1,rr:0,vrr:0

exec-once = noctalia-shell --no-duplicate
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# keyboard
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0
accel_profile=1 # 0 (None), 1 (Flat), 2 (Adaptive).

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.5
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=32
drag_tile_to_tile=1
xwayland_persistence = 0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-vertical
animations=0
layer_animations=0
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_radius = 4
blur_params_num_passes = 2
blur_params_noise = 0.042
blur_params_brightness = 0.7
blur_params_contrast = 0.7
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 0
shadow_only_floating = 0
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor = 0x181825ff

border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.98

# Appearance
gappih=7
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=1.0
scratchpad_height_ratio=1.0
borderpx=2
rootcolor=0x11111bff
bordercolor=0x1e1e2e00
focuscolor=0xb4befeee
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0xf5c2e7ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff


# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
# tagrule=id:1,layout_name:tile
# tagrule=id:2,layout_name:scroller
# tagrule=id:3,layout_name:scroller
# tagrule=id:4,layout_name:scroller
# tagrule=id:5,layout_name:tile
# tagrule=id:6,layout_name:scroller
# tagrule=id:7,layout_name:tile
# tagrule=id:8,layout_name:tile
# tagrule=id:9,layout_name:tile

windowrule=istagsilent:1,tags:5,appid:^(.*steam_app.*)$|^(.*gamescope.*)$|^(cs2)$
windowrule=istagsilent:1,tags:6,appid:^([Ss]team)$|^(net.lutris.Lutris)$
windowrule=istagsilent:1,tags:7,appid:^(spotify)$|^(feishin)$
windowrule=istagsilent:1,tags:8,appid:^(qbittorrent)$
windowrule=istagsilent:1,tags:9,appid:^(thunderbird)$|^(vesktop)$|^(legcord)$

windowrule=unfocused_opacity:1.0,appid:^(.*firefox.*)$|^(.*librewolf.*)$|^(.*zen-beta.*)$
windowrule=isfloating:1,appid:^(mpv)$|^(pqiv)$

# windowrule=force_tearing:1,title:^(.*steam_app.*)$|^(.*gamescope.*)$|^(cs2)$
# adaptive_sync=1

# allow_tearing=1
# reload config
bind=SUPER+SHIFT,r,reload_config

bind=SUPER,Return,spawn,foot
bind=SUPER,J,spawn,librewolf
bind=SUPER+SHIFT,M,spawn,thunderbird

bind=SUPER,space,spawn,noctalia-shell ipc call launcher toggle
bind=SUPER+SHIFT,space,spawn,noctalia-shell ipc call controlCenter toggle
bind=SUPER+CTRL,space,spawn,noctalia-shell ipc call calendar toggle
bind=SUPER,k,spawn,noctalia-shell ipc call launcher clipboard
bind=SUPER+SHIFT,k,spawn,noctalia-shell ipc call launcher emoji
# bind=SUPER+SHIFT,w,spawn,noctalia-shell ipc call wallpaper toggle
bind=SUPER+CTRL,w,spawn,noctalia-shell ipc call wallpaper random
bind=SUPER+CTRL,l,spawn,noctalia-shell ipc call sessionMenu toggle
bind=SUPER+CTRL,n,spawn,noctalia-shell ipc call notifications toggleHistory
bind=SUPER+SHIFT,b,spawn,noctalia-shell ipc call bar toggle

bind=NONE,XF86AudioRaiseVolume,spawn,noctalia-shell ipc call volume increase
bind=NONE,XF86AudioLowerVolume,spawn,noctalia-shell ipc call volume decrease
bind=NONE,XF86AudioMute,spawn,noctalia-shell ipc call volume muteOutput
bind=NONE,XF86AudioMicMute,spawn,noctalia-shell ipc call volume muteInput

bind=NONE,XF86AudioNext,spawn,noctalia-shell ipc call media next
bind=NONE,XF86AudioPrev,spawn,noctalia-shell ipc call media previous
bind=NONE,XF86AudioPlay,spawn,noctalia-shell ipc call media playPause
bind=NONE,XF86AudioPause,spawn,noctalia-shell ipc call media playPause

# Application Launchers
# Security
bind=SUPER+ALT,l,spawn,dms ipc call lock lock

# Audio Controls
# bind=NONE,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 3
# bind=NONE,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 3
# bind=NONE,XF86AudioMute,spawn,dms ipc call audio mute

# exit
# bind=SUPER,m,quit
bind=SUPER+SHIFT,W,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,a,focusdir,left
bind=SUPER,e,focusdir,down
bind=SUPER,i,focusdir,up
bind=SUPER,c,focusdir,right

# swap window
bind=SUPER+SHIFT,a,exchange_client,left
bind=SUPER+SHIFT,e,exchange_client,down
bind=SUPER+SHIFT,i,exchange_client,up
bind=SUPER+SHIFT,c,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,slash,toggleoverview,
bind=SUPER,v,togglefloating,
bind=SUPER+SHIFT,v,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
# bind=SUPER+,,minimized,
bind=SUPER,slash,toggleoverlay,
# bind=SUPER+SHIFT,I,restore_minimized
# bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=SUPER,r,set_proportion,1.0
# bind=SUPER,x,switch_proportion_preset,

# switch layout
# bind=SUPER,s,switch_layout
# bind=SUPER,s,setlayout,scroller
# bind=SUPER+SHIFT,s,setlayout,tile

# tag switch
# bind=SUPER,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+SUPER,Left,tagtoleft,0
# bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER,n,view,1,0
bind=SUPER,t,view,2,0
bind=SUPER,h,view,3,0
bind=SUPER,p,view,4,0
bind=SUPER,d,view,5,0
bind=SUPER,semicolon,view,6,0
bind=SUPER,u,view,7,0
bind=SUPER,o,view,8,0
bind=SUPER,y,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=SUPER+SHIFT,1,tagsilent,1,0
bind=SUPER+SHIFT,2,tagsilent,2,0
bind=SUPER+SHIFT,3,tagsilent,3,0
bind=SUPER+SHIFT,4,tagsilent,4,0
bind=SUPER+SHIFT,5,tagsilent,5,0
bind=SUPER+SHIFT,6,tagsilent,6,0
bind=SUPER+SHIFT,7,tagsilent,7,0
bind=SUPER+SHIFT,8,tagsilent,8,0
bind=SUPER+SHIFT,9,tagsilent,9,0

bind=SUPER+SHIFT,n,tagsilent,1,0
bind=SUPER+SHIFT,t,tagsilent,2,0
bind=SUPER+SHIFT,h,tagsilent,3,0
bind=SUPER+SHIFT,p,tagsilent,4,0
bind=SUPER+SHIFT,d,tagsilent,5,0
bind=SUPER+SHIFT,semicolon,tagsilent,6,0
bind=SUPER+SHIFT,u,tagsilent,7,0
bind=SUPER+SHIFT,o,tagsilent,8,0
bind=SUPER+SHIFT,y,tagsilent,9,0

# monitor switch
# bind=alt+shift,Left,focusmon,left
# bind=alt+shift,Right,focusmon,right
# bind=SUPER+Alt,Left,tagmon,left
# bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=SUPER+SHIFT,minus,incgaps,-1
bind=SUPER+SHIFT,equal,incgaps,1
bind=SUPER+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
# bind=SUPER,minus,resizewin,+0,-50
# bind=CTRL+ALT,Down,resizewin,+0,+50
bind=SUPER,minus,resizewin,-50,+0
bind=SUPER,equal,resizewin,+50,+0


# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
# mousebind=NONE,btn_left,toggleoverview,1
# mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Scratchpad
bind=SUPER+CTRL,s,toggle_named_scratchpad,st-wiremix,none,foot --app-id st-wiremix -e wiremix -v output
bind=SUPER+CTRL,b,toggle_named_scratchpad,st-btop,none,foot --app-id st-btop -e btop
# bind=SUPER+CTRL,t,toggle_named_scratchpad,st-tray,none,foot --app-id st-tray -e tray-tui
bind=SUPER+CTRL,t,toggle_named_scratchpad,st-tray,none,foot --class st-tray -e tray-tui
bind=SUPER,l,toggle_named_scratchpad,io.github.xiaoyifang.goldendict_ng,none,goldendict

windowrule=isnamedscratchpad:1,isnoanimation:1,width:1280,height:800,noblur:1,appid:^(st-kitty)$|^(st-wiremix)$|^(st-btop)$|^(st-tray)$
windowrule=isnamedscratchpad:1,isnoanimation:1,width:680,height:1360,offsetx:99,appid:io.github.xiaoyifang.goldendict_ng
